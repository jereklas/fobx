name: Publish packages and docs

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish_npm:
        description: Publish npm packages
        required: true
        default: true
        type: boolean
      deploy_docs:
        description: Build and deploy static docs
        required: true
        default: true
        type: boolean
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  detect-changes:
    name: Detect publish changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      publish_npm: ${{ steps.detect.outputs.publish_npm }}
      deploy_docs: ${{ steps.detect.outputs.deploy_docs }}
    steps:
      - name: Check out repository
        if: ${{ github.event_name == 'push' }}
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect version and docs changes
        id: detect
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" != "push" ]]; then
            echo "publish_npm=false" >> "$GITHUB_OUTPUT"
            echo "deploy_docs=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          before="${{ github.event.before }}"
          after="${{ github.sha }}"

          if [[ "$before" =~ ^0+$ ]]; then
            before="$(git rev-list --max-count=1 "$after"^ 2>/dev/null || true)"
          fi

          if [[ -z "$before" ]]; then
            echo "publish_npm=true" >> "$GITHUB_OUTPUT"
            echo "deploy_docs=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          version_changed() {
            local file="$1"
            git diff --unified=0 "$before" "$after" -- "$file" | grep -qE '^[+-][[:space:]]*"version"[[:space:]]*:'
          }

          package_version() {
            local file="$1"
            sed -n 's/^[[:space:]]*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' "$file" | head -n1
          }

          version_unpublished() {
            local file="$1"
            local pkg_name="$2"
            local pkg_version

            pkg_version="$(package_version "$file")"
            if [[ -z "$pkg_version" ]]; then
              echo "Unable to determine version from $file" >&2
              return 1
            fi

            if npm view "${pkg_name}@${pkg_version}" version >/dev/null 2>&1; then
              return 1
            fi

            echo "Detected unpublished package version: ${pkg_name}@${pkg_version}"
            return 0
          }

          publish_npm=false
          if version_changed core/deno.jsonc || version_changed react/deno.jsonc || \
             version_unpublished core/deno.jsonc @fobx/core || \
             version_unpublished react/deno.jsonc @fobx/react; then
            publish_npm=true
          fi

          deploy_docs=false
          if git diff --name-only "$before" "$after" -- static-docs .github/workflows/publish.yml | grep -q .; then
            deploy_docs=true
          fi

          echo "publish_npm=${publish_npm}" >> "$GITHUB_OUTPUT"
          echo "deploy_docs=${deploy_docs}" >> "$GITHUB_OUTPUT"

  publish-npm:
    name: Publish npm packages
    needs:
      - detect-changes
    if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish_npm == true) || (github.event_name == 'push' && needs.detect-changes.outputs.publish_npm == 'true') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          check-latest: true
          registry-url: https://registry.npmjs.org

      - name: Verify bundled Node and npm versions
        run: |
          set -euo pipefail
          min_npm_version="11.5.1"
          npm_version="$(npm --version)"

          node --version
          echo "$npm_version"

          if [[ "$(printf '%s\n%s\n' "$min_npm_version" "$npm_version" | sort -V | head -n1)" != "$min_npm_version" ]]; then
            echo "Bundled npm $npm_version is older than $min_npm_version" >&2
            exit 1
          fi

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.2.12

      - name: Build and publish packages
        run: |
          set -euo pipefail

          npm config delete always-auth || true

          publish_if_needed() {
            local pkg_dir="$1"
            local pkg_name
            local pkg_version
            local dist_tag

            pkg_name="$(node -p "require('./${pkg_dir}/dist/package.json').name")"
            pkg_version="$(node -p "require('./${pkg_dir}/dist/package.json').version")"
            dist_tag="$(node -p "const version = require('./${pkg_dir}/dist/package.json').version; const prerelease = version.split('-')[1]; prerelease ? prerelease.split('.')[0] : 'latest'")"

            if npm view "${pkg_name}@${pkg_version}" version >/dev/null 2>&1; then
              echo "Skipping ${pkg_name}@${pkg_version}; it is already published."
              return 0
            fi

            echo "Publishing ${pkg_name}@${pkg_version} with tag ${dist_tag}"
            (
              cd "${pkg_dir}/dist"
              npm publish --access public --provenance --tag "${dist_tag}"
            )
          }

          for pkg in core react; do
            echo "::group::Build ${pkg}"
            (
              cd "$pkg"
              deno task build
            )
            echo "::endgroup::"

            echo "::group::Publish ${pkg}"
            publish_if_needed "$pkg"
            echo "::endgroup::"
          done

  build-docs:
    name: Build static docs
    needs:
      - detect-changes
    if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.deploy_docs == true) || (github.event_name == 'push' && needs.detect-changes.outputs.deploy_docs == 'true') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.2.12

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Determine docs base path
        id: docs-base
        env:
          REPOSITORY_NAME: ${{ github.event.repository.name }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          owner="$(printf '%s' "$REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          repo="$(printf '%s' "$REPOSITORY_NAME" | tr '[:upper:]' '[:lower:]')"

          if [[ "$repo" == "$owner.github.io" ]]; then
            echo "value=/" >> "$GITHUB_OUTPUT"
          else
            echo "value=/$REPOSITORY_NAME/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build docs site
        working-directory: static-docs
        env:
          DOCS_BASE_PATH: ${{ steps.docs-base.outputs.value }}
        run: deno task build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: static-docs/dist

  deploy-docs:
    name: Deploy static docs
    needs:
      - detect-changes
      - build-docs
    if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.deploy_docs == true) || (github.event_name == 'push' && needs.detect-changes.outputs.deploy_docs == 'true') }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
